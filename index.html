<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Transparencia - Club Ciclista Santiago Pista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy:#2D3561; --orange:#E8572A; --blue:#3B82F6; --bg:#F1F5F9; }
        body { background:var(--bg); font-family:'DM Sans',system-ui,sans-serif; margin:0; }
        .mono { font-family:'JetBrains Mono',monospace; }

        /* Scrollbars */
        .scr::-webkit-scrollbar { width:5px; height:6px; }
        .scr::-webkit-scrollbar-track { background:transparent; }
        .scr::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }

        /* Heat map cells */
        .hm-paid { background:#D1FAE5; color:#065F46; }
        .hm-unpaid { background:#FEE2E2; color:#991B1B; }
        .hm-na { background:#EFF6FF; color:#93C5FD; }
        .hm-future { background:#F8FAFC; color:#E2E8F0; }
        .hm-exc { background:#FEF3C7; color:#92400E; } 
        .hm-susp { background:#e2e8f0; color:#475569; } 

        /* Sticky first column */
        .sticky-col { position:sticky; left:0; z-index:5; background:inherit; }
        thead .sticky-col { z-index:15; }

        /* Bar chart Colors */
        .bar-ing { background:var(--navy); }
        .bar-egr { background:var(--orange); }
        .bar-cob { background:#FBBF24; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fin { animation:fadeIn .3s ease-out forwards; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .sp { animation:spin .8s linear infinite; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const SRC = {
    socios:   { l:'Socios',    url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTti5wNytfqEQj9SKhGO-01aG9MsAfQhnk1UQjxLBZTGd_UoHW4-mEnBvCtbjUfTvGtXfr-NNhgHvRd/pub?gid=113097392&single=true&output=csv' },
    txs2026:  { l:'2026',      url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTti5wNytfqEQj9SKhGO-01aG9MsAfQhnk1UQjxLBZTGd_UoHW4-mEnBvCtbjUfTvGtXfr-NNhgHvRd/pub?gid=530518501&single=true&output=csv' },
    txs2025:  { l:'2025',      url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTti5wNytfqEQj9SKhGO-01aG9MsAfQhnk1UQjxLBZTGd_UoHW4-mEnBvCtbjUfTvGtXfr-NNhgHvRd/pub?gid=627364486&single=true&output=csv' },
    novedades:{ l:'Novedades', url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTti5wNytfqEQj9SKhGO-01aG9MsAfQhnk1UQjxLBZTGd_UoHW4-mEnBvCtbjUfTvGtXfr-NNhgHvRd/pub?gid=297967474&single=true&output=csv' },
};

const CUOTA_BASE = 17500;
const CORTE_ABS = 2025 * 12 + 1; 

const MS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MFULL = [{id:'01',n:'Enero'},{id:'02',n:'Febrero'},{id:'03',n:'Marzo'},{id:'04',n:'Abril'},{id:'05',n:'Mayo'},{id:'06',n:'Junio'},{id:'07',n:'Julio'},{id:'08',n:'Agosto'},{id:'09',n:'Septiembre'},{id:'10',n:'Octubre'},{id:'11',n:'Noviembre'},{id:'12',n:'Diciembre'}];

const STOP_WORDS = ["que", "del", "los", "las", "por", "con", "sin", "tef", "cta", "cct", "bco", "trf", "spa", "ltda", "limitada", "pago", "cuota", "mes", "mensualidad", "transferencia", "abono", "de", "la", "traspaso", "aporte", "khipu", "fintoc", "transf", "banco", "estado"];

const ALIASES = {
    "armijo churkovic": ["armijo jimenez"],
    // Puedes agregar más alias manuales aquí si algún banco es muy rebelde
    // "victor diaz": ["v.diaz"], 
};

// ============================================================
// UTILS
// ============================================================
const fmt = v => (!v||v===0)?'$0':new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
const fmtK = v => {
    if (v >= 1000000) return (v / 1000000).toLocaleString('es-CL', {maximumFractionDigits: 1}) + 'M';
    if (v >= 1000) return (v / 1000).toLocaleString('es-CL', {maximumFractionDigits: 1}) + 'K';
    return v.toString();
};

const nk = k => k?k.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[()\/\\°#¿?¡!]/g,'').replace(/\s+/g,'_').toLowerCase().trim():'';
const unaccent = s => s ? s.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : '';

const gv = (r,ks) => { for(const k of ks) if(r[k]!==undefined&&r[k]!==null&&r[k].toString().trim()!=='') return r[k].toString().trim(); return ''; };
const nr = raw => { const o={}; for(const k in raw) o[nk(k)]=(raw[k]||'').toString().trim(); return o; };
const cn = v => { if(!v||v==='') return 0; if(typeof v==='number') return Math.abs(v); const s=v.toString().trim(); if(!s||s==='-'||s==='$') return 0; const n=Number(s.split(',')[0].replace(/[^0-9-]/g,'')); return isNaN(n)?0:Math.abs(n); };
const pd = s => { if(!s) return {y:'',m:'',d:''}; const str=s.toString().trim(); let y='',m='',d=''; if(str.includes('/')){const p=str.split('/');if(p.length>=3){if(p[2].length===4){d=p[0].padStart(2,'0');m=p[1].padStart(2,'0');y=p[2];}else if(p[0].length===4){y=p[0];m=p[1].padStart(2,'0');d=p[2].padStart(2,'0');}}}else if(str.includes('-')){const p=str.split('-');if(p.length>=3){if(p[0].length===4){y=p[0];m=p[1].padStart(2,'0');d=p[2].padStart(2,'0');}else if(p[2].length===4){d=p[0].padStart(2,'0');m=p[1].padStart(2,'0');y=p[2];}}} return {y,m,d}; };
const abs = (y,m) => parseInt(y)*12+parseInt(m); 

const classCat = (c, d) => { 
    const u=(c||'').toUpperCase(); 
    const desc=(d||'').toUpperCase();
    if(desc.includes('TRICOTA')||desc.includes('INDUMENTARIA')||desc.includes('LICENCIA')||desc.includes('ROPA')||desc.includes('CALZA')||desc.includes('INSCRIPCION')||desc.includes('SEGURO')||desc.includes('EVENTO')) return 'OTROS';
    if(u.includes('TRICOTA')||u.includes('INDUMENTARIA')||u.includes('LICENCIA')||u.includes('ROPA')||u.includes('CALZA')||u.includes('INSCRIPCION')||u.includes('SEGURO')||u.includes('EVENTO')) return 'OTROS';
    if(u.includes('CUOTA')||u.includes('MENSUALIDAD')) return 'CUOTA'; 
    if(u.includes('ARRIENDO')||u.includes('VELO')||u.includes('PISTA')) return 'ARRIENDO'; 
    if(u.includes('DONACION')||u.includes('DONACIÓN')) return 'DONACION'; 
    return 'OTROS'; 
};

const PXS = [u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
const pTxt = t => new Promise((r,j)=>{Papa.parse(t,{header:true,skipEmptyLines:'greedy',transformHeader:h=>h.trim(),complete:x=>r({data:x.data,h:x.meta?.fields||[]}),error:e=>j(e)});});
const load = async url => {
    try{const r=await new Promise((r,j)=>{Papa.parse(url,{download:true,header:true,skipEmptyLines:'greedy',transformHeader:h=>h.trim(),complete:x=>r({data:x.data,h:x.meta?.fields||[]}),error:e=>j(e)});});if(r.data.length>0)return r;}catch(e){console.warn('[D]',e);}
    for(let i=0;i<PXS.length;i++){try{const rsp=await fetch(PXS[i](url));if(!rsp.ok)throw new Error(`${rsp.status}`);return await pTxt(await rsp.text());}catch(e){console.warn(`[P${i+1}]`,e);}}
    throw new Error('Load failed');
};

const pCart = (data,anio,f) => data.map(raw => {
    const r=nr(raw),
          fecha=gv(r,['fecha','date']),
          desc=gv(r,['descripcion','detalle','glosa']),
          cat=gv(r,['categoria','clasificacion','cat']),
          socioId=gv(r,['socioid','id_socio','socio_id','rut_socio','rut','nombre','socio','alumno']); 
    let cs,as;
    if(f==='2026'){cs=gv(r,['cheques__cargos','cheques_cargos','cargos','cargo','cheques']);as=gv(r,['depositos__abonos','depositos_abonos','abonos','abono','depositos']);}
    else{cs=gv(r,['cargos_clp','cargos','cargo']);as=gv(r,['abonos_clp','abonos','abono']);}
    const c=cn(cs),a=cn(as); let tipo='',monto=0;
    if(a>0){tipo='INGRESO';monto=a;}else if(c>0){tipo='EGRESO';monto=c;}else return null;
    const di=pd(fecha);
    return {fecha,desc,tipo,monto,sub:tipo==='INGRESO'?classCat(cat, desc):'EGRESO',cat:cat||'Sin Categoría',y:di.y||anio,m:di.m,d:di.d,sk:`${di.y||anio}-${di.m}-${di.d}`, socioId};
}).filter(Boolean);

const Ic = ({name,cls}) => { const ref=useRef(null); useEffect(()=>{if(ref.current){ref.current.innerHTML=`<i data-lucide="${name}" class="${cls||''}"></i>`;if(window.lucide)lucide.createIcons({root:ref.current});}},[name,cls]); return <span ref={ref} style={{display:'inline-flex',alignItems:'center'}} />; };

// ============================================================
// APP
// ============================================================
const App = () => {
    const [socios,setSocios] = useState([]);
    const [txs,setTxs] = useState([]);
    const [novs,setNovs] = useState([]);
    const [ls,setLs] = useState({socios:null,txs2026:null,txs2025:null,novedades:null});
    const [dbg,setDbg] = useState({});
    const [showDbg,setShowDbg] = useState(false);

    const now = new Date();
    
    const [yf,setYf] = useState(now.getFullYear().toString());
    const [mf,setMf] = useState((now.getMonth() + 1).toString().padStart(2, '0'));
    const [sf,setSf] = useState('TODOS');
    const [search,setSearch] = useState('');
    const [tab,setTab] = useState('heatmap');

    const loading = Object.values(ls).some(v=>v===null);

    useEffect(()=>{(async()=>{
        try{ const {data,h}=await load(SRC.socios.url); setDbg(p=>({...p,socios:{h,n:data.length,s:data[0]}}));
            setSocios(data.map((raw,i)=>{
                const r=nr(raw);
                const n=gv(r,['nombre_completo','nombre','socio']);
                const rut=gv(r,['rut']);
                let est=(gv(r,['estado_en_el_club','estado','status'])||'ACTIVO').toUpperCase();
                const ts=gv(r,['tipo_socio','tipo']);
                
                const fi=gv(r,['fecha_de_ingreso','fecha_ingreso','fechaingreso']);
                const fp=pd(fi); 
                let iy=fp.y?parseInt(fp.y):2024; 
                let im=fp.m?parseInt(fp.m):1;

                const fSalida=gv(r,['fecha_act_estado','fecha_de_salida','fecha_salida','fechasalida','baja','retiro']);
                const fpS=pd(fSalida);
                
                let isSuspended = est.includes('SUSPENDID') || est.includes('DESVINCULAD') || est.includes('RETIRAD') || est.includes('INACTIVO') || est.includes('RENUNCIA');
                let salidaAbs = fpS.y ? abs(fpS.y, fpS.m) : (isSuspended ? abs(now.getFullYear(), now.getMonth()+1) : 99999);

                const nameUp = unaccent(n);
                if (nameUp.includes("matias quezada")) {
                    est = "RENUNCIA";
                    isSuspended = true;
                    iy = 2025;
                    im = 9; 
                    salidaAbs = 2025 * 12 + 12; 
                }

                return{id:i+1,rut,nombre:n||`S${i+1}`,estado:est,tipo:ts,cuotaBase:CUOTA_BASE,fi,iy,im, isSuspended, salidaAbs};
            }).filter(s=>s.nombre&&s.nombre.length>2));
            setLs(p=>({...p,socios:'ok'}));}catch(e){setLs(p=>({...p,socios:`Err: ${e}`}));setDbg(p=>({...p,socios:{error:String(e)}}));}

        try{const{data,h}=await load(SRC.txs2026.url);setDbg(p=>({...p,txs2026:{h,n:data.length,s:data[0]}}));setTxs(p=>[...p,...pCart(data,'2026','2026')]);setLs(p=>({...p,txs2026:'ok'}));}catch(e){setLs(p=>({...p,txs2026:`Err: ${e}`}));}
        try{const{data,h}=await load(SRC.txs2025.url);setDbg(p=>({...p,txs2025:{h,n:data.length,s:data[0]}}));setTxs(p=>[...p,...pCart(data,'2025','2025')]);setLs(p=>({...p,txs2025:'ok'}));}catch(e){setLs(p=>({...p,txs2025:'ok'}));}

        try{const{data}=await load(SRC.novedades.url);
            setNovs(data.map(raw=>{const r=nr(raw);
                const rut=gv(r,['rut']);const nom=gv(r,['nombre_completo','nombre']);
                const tipo=(gv(r,['tipo_de_novedad','tipo_novedad','novedad'])||'').toUpperCase();
                const fiStr=gv(r,['fecha_inicio']);const ftStr=gv(r,['fecha_termino','fecha_fin']);
                const fi=pd(fiStr);const ft=pd(ftStr);
                let factor=0; 
                if(tipo.includes('CONGELA')||tipo.includes('MONTO 0')||tipo.includes('MONTO_0')) factor=0;
                else if(tipo.includes('BECA 50')||tipo.includes('50%')||tipo.includes('BECA_50')) factor=0.5;
                else if(tipo.includes('BECA')) factor=0;
                else factor=0; 
                return{rut,nombre:nom,tipo,factor,fiAbs:fi.y?abs(fi.y,fi.m):0,ftAbs:ft.y?abs(ft.y,ft.m):99999,fiStr,ftStr};
            }).filter(n=>n.rut||n.nombre));
            setLs(p=>({...p,novedades:'ok'}));}catch(e){setLs(p=>({...p,novedades:`Err: ${e}`}));}
    })();},[]);

    const curAbs = abs(now.getFullYear(), now.getMonth()+1);

    const allColumns = useMemo(()=>{
        const cols=[];
        const maxAbs = abs(Math.max(now.getFullYear(), 2026), 12); 
        for(let a=CORTE_ABS; a<=maxAbs; a++){
            const y=Math.floor((a-1)/12); const m=((a-1)%12)+1;
            cols.push({abs:a, y:y.toString(), m:m.toString().padStart(2,'0'), label:`${MS[m-1]}'${y.toString().slice(2)}`, yearNum:y, monthNum:m});
        }
        return cols;
    },[now]);

    const displayColumns = useMemo(() => {
        let targetY = yf === 'TODOS' ? now.getFullYear() : parseInt(yf);
        let cols = allColumns.filter(c => c.yearNum === targetY);
        let targetAbs;
        if (mf !== 'TODOS') targetAbs = abs(targetY, parseInt(mf));
        else targetAbs = (targetY === now.getFullYear()) ? curAbs : abs(targetY, 12);

        return cols.map(c => ({
            ...c,
            isRecent3: c.abs <= targetAbs && c.abs >= targetAbs - 2
        }));
    }, [allColumns, yf, mf, curAbs, now]);

    const txFilt = useMemo(()=>txs.filter(t=>{
        if (parseInt(t.y) < 2025) return false;
        if (yf !== 'TODOS' && t.y !== yf) return false;
        if (mf !== 'TODOS' && t.m !== mf) return false;
        return true;
    }),[txs, yf, mf]);

    const kI = useMemo(()=>txFilt.filter(t=>t.tipo==='INGRESO').reduce((a,b)=>a+b.monto,0),[txFilt]);
    const kE = useMemo(()=>txFilt.filter(t=>t.tipo==='EGRESO').reduce((a,b)=>a+b.monto,0),[txFilt]);
    const txCuota = useMemo(()=>txs.filter(t=>parseInt(t.y)>=2025&&t.tipo==='INGRESO'&&t.sub==='CUOTA'),[txs]);

    const getFactorNovedad = (socio, mesAbs) => {
        const matching = novs.filter(n => {
            const matchRut = socio.rut && n.rut && socio.rut === n.rut;
            const matchNom = !matchRut && n.nombre && socio.nombre && (() => {
                const p1 = unaccent(socio.nombre).split(' ').filter(p=>p.length>2);
                const p2 = unaccent(n.nombre).split(' ').filter(p=>p.length>2);
                return p1.filter(p=>p2.includes(p)).length >= 2;
            })();
            if (!matchRut && !matchNom) return false;
            return mesAbs >= n.fiAbs && mesAbs <= n.ftAbs;
        });
        if (matching.length === 0) return 1; 
        return Math.min(...matching.map(n => n.factor));
    };

    // MOTOR DE FRECUENCIA DE PALABRAS: Analiza si un apellido o nombre es único en todo el club
    const wordFreq = useMemo(() => {
        const freq = {};
        socios.forEach(s => {
            const words = unaccent(s.nombre).split(/[\s_\-\.,]+/).filter(w => w.length > 2 && !STOP_WORDS.includes(w));
            words.forEach(w => {
                freq[w] = (freq[w] || 0) + 1;
            });
        });
        return freq;
    }, [socios]);

    const heatData = useMemo(() => {
        return socios
            .filter(s => {
                const mn = unaccent(s.nombre).includes(unaccent(search));
                const ms = sf==='TODOS' ? true : sf==='ACTIVO' ? (!s.isSuspended) : s.estado===sf || (sf==='SUSPENDIDO' && s.isSuspended);
                return mn && ms;
            })
            .map(s => {
                const isActive = !s.isSuspended;
                const ingresoAbs = abs(s.iy, s.im);
                const primerMesExigible = Math.max(ingresoAbs, CORTE_ABS);

                // --- NUEVO ALGORITMO DE CRUCE INTELIGENTE ---
                const pagos = txCuota.filter(tx => {
                    const txDesc = unaccent(tx.desc).trim();
                    const txSocioId = unaccent(tx.socioId).trim();
                    const socioName = unaccent(s.nombre).trim();

                    // 1. Cruce RUT exacto
                    const rutClean = s.rut ? s.rut.replace(/[^0-9k]/g, '') : '';
                    const txDescCleanRut = txDesc.replace(/[^0-9k]/g, '');
                    const txIdCleanRut = txSocioId.replace(/[^0-9k]/g, '');
                    if (rutClean && rutClean.length >= 7) {
                        if (txIdCleanRut.includes(rutClean) || txDescCleanRut.includes(rutClean)) return true;
                        const rutBase = rutClean.slice(0, -1);
                        if (rutBase.length >= 7 && (txIdCleanRut.includes(rutBase) || txDescCleanRut.includes(rutBase))) return true;
                    }

                    // 2. Cruce ID Directo Exacto
                    if (s.id && txSocioId === s.id.toString()) return true;

                    // 3. Diccionario Manual
                    const isAliasMatch = Object.entries(ALIASES).some(([nameKey, aliases]) => {
                        if (socioName.includes(nameKey)) {
                            return aliases.some(alias => txDesc.includes(alias) || txSocioId.includes(alias));
                        }
                        return false;
                    });
                    if (isAliasMatch) return true;

                    // 4. Algoritmo de Coincidencia por Frecuencia (Soluciona Victor Diaz y Diego Paredes)
                    const txWords = `${txSocioId} ${txDesc}`.split(/[\s_\-\.,]+/).filter(w => w.length > 2 && !STOP_WORDS.includes(w));
                    const nameWords = socioName.split(/[\s_\-\.,]+/).filter(w => w.length > 2 && !STOP_WORDS.includes(w));

                    let matchedWords = [];
                    for (const nw of nameWords) {
                        const isMatch = txWords.some(tw => {
                            if (nw === tw) return true;
                            // Tolerancia a palabras ligeramente cortadas (ej. abrevian un nombre largo)
                            if (nw.length >= 4 && tw.length >= 4 && (nw.startsWith(tw) || tw.startsWith(nw))) return true;
                            return false;
                        });
                        if (isMatch && !matchedWords.includes(nw)) {
                            matchedWords.push(nw);
                        }
                    }

                    // Si hay 2 palabras o más que hacen match (Ej. "Victor" y "Diaz"), es el socio seguro.
                    if (matchedWords.length >= 2) return true;

                    // Si solo hay 1 palabra que hizo match (Ej. solo dice "Diaz" o solo dice "Paredes")
                    if (matchedWords.length === 1) {
                        const theWord = matchedWords[0];
                        // Verificamos si esa palabra es ÚNICA en todo el club.
                        // Si "Diaz" lo tiene solo Victor, se le asigna a él (Corrige su error).
                        // Si "Diego" lo tienen varios, NO se le asigna a nadie automáticamente para evitar robar pagos (Corrige error de Diego).
                        if (wordFreq[theWord] === 1) {
                            return true;
                        }
                    }

                    return false;
                });
                
                const totalPagado = pagos.reduce((a,t)=>a+t.monto, 0);

                const monthData = [];
                let exigibleAcum = 0;

                for (const col of allColumns) {
                    const mesAbs = col.abs;
                    const isFuture = mesAbs > curAbs;

                    if (mesAbs < primerMesExigible) {
                        monthData.push({abs:mesAbs, status:'na', label:'—', cuotaMes:0, exigAcum:0});
                        continue;
                    }

                    if (s.isSuspended && mesAbs > s.salidaAbs) {
                        monthData.push({abs:mesAbs, status:'susp', label:'S', cuotaMes:0, exigAcum:exigibleAcum, isSuspendedCell:true});
                        continue;
                    }

                    if (isFuture) {
                        monthData.push({abs:mesAbs, status:'future', label:'·', cuotaMes:0, exigAcum:exigibleAcum});
                        continue;
                    }

                    const factor = getFactorNovedad(s, mesAbs);
                    const cuotaMes = Math.round(s.cuotaBase * factor);
                    exigibleAcum += cuotaMes;

                    const paid = totalPagado >= exigibleAcum;
                    const isException = factor < 1;

                    monthData.push({
                        abs: mesAbs,
                        status: paid ? 'paid' : 'unpaid',
                        label: paid ? '✓' : '✗',
                        cuotaMes,
                        exigAcum: exigibleAcum,
                        pagadoAcum: totalPagado,
                        isException,
                        factor,
                    });
                }

                const deuda = Math.max(0, exigibleAcum - totalPagado);
                const impagos = (deuda > 0 && s.cuotaBase > 0) ? Math.ceil(deuda / s.cuotaBase) : 0;

                return {
                    ...s, monthData, impagos, totalPagado, exigibleAcum, deuda,
                    isActive,
                };
            })
            .sort((a,b) => {
                if (b.deuda !== a.deuda) return b.deuda - a.deuda;
                if (b.impagos !== a.impagos) return b.impagos - a.impagos;
                return a.nombre.localeCompare(b.nombre);
            });
    }, [socios, txCuota, novs, allColumns, curAbs, search, sf, wordFreq]);

    const kpiRecaudacion = useMemo(() => {
        let colsToSum = allColumns;
        if(yf !== 'TODOS') colsToSum = colsToSum.filter(c => c.yearNum === parseInt(yf));
        if(mf !== 'TODOS') colsToSum = colsToSum.filter(c => c.monthNum === parseInt(mf));
        const validAbs = colsToSum.map(c => c.abs);

        let optimo = 0;
        heatData.forEach(s => {
            s.monthData.forEach(m => {
                if (validAbs.includes(m.abs)) optimo += m.cuotaMes; 
            });
        });

        const real = txFilt.filter(t => t.tipo === 'INGRESO' && t.sub === 'CUOTA').reduce((a, b) => a + b.monto, 0);
        return { optimo, real, brecha: optimo - real };
    }, [heatData, allColumns, yf, mf, txFilt]);

    const chartData4Months = useMemo(() => {
        const cols = [];
        for(let i=3; i>=0; i--){
            const a = curAbs - i;
            const y = Math.floor((a-1)/12); 
            const m = ((a-1)%12)+1;
            cols.push({abs:a, y:y.toString(), m:m.toString().padStart(2,'0'), label:`${MS[m-1]}'${y.toString().slice(2)}`});
        }
        return cols.map(col => {
            const mtxs = txs.filter(t=>t.y===col.y&&t.m===col.m);
            const ing = mtxs.filter(t=>t.tipo==='INGRESO').reduce((a,b)=>a+b.monto,0);
            const eg = mtxs.filter(t=>t.tipo==='EGRESO').reduce((a,b)=>a+b.monto,0);
            
            let optimo = 0;
            heatData.forEach(s => {
                const md = s.monthData.find(x => x.abs === col.abs);
                if(md) optimo += md.cuotaMes;
            });
            const ingCuotas = mtxs.filter(t=>t.tipo==='INGRESO'&&t.sub==='CUOTA').reduce((a,b)=>a+b.monto,0);
            const porCobrar = Math.max(0, optimo - ingCuotas);

            return { ...col, ing, eg, porCobrar };
        });
    }, [txs, curAbs, heatData]);
    
    const maxBar = useMemo(()=>Math.max(...chartData4Months.map(d=>Math.max(d.ing, d.eg, d.porCobrar)), 1),[chartData4Months]);

    const egresos = useMemo(()=>txFilt.filter(t=>t.tipo==='EGRESO').sort((a,b)=>(b.sk||'').localeCompare(a.sk||'')),[txFilt]);

    const renderTable = (data, title, colorTheme) => (
        <div className={`bg-white rounded-xl shadow-sm border border-${colorTheme}-200 mb-6 fin`}>
            <div className={`p-3 border-b border-slate-100 bg-${colorTheme}-50 rounded-t-xl flex flex-wrap items-center justify-between gap-2`}>
                <div>
                    <h2 className={`font-bold text-${colorTheme}-800 text-sm flex items-center gap-2`}>
                        <Ic name={colorTheme === 'rose' ? 'alert-octagon' : 'grid-3x3'} cls={`w-4 h-4 text-${colorTheme}-600`} /> 
                        {title}
                    </h2>
                    <p className="text-[9px] sm:text-[10px] text-slate-500 mt-0.5 flex flex-wrap items-center gap-x-2 sm:gap-x-3 gap-y-1">
                        <span><span className="inline-block w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-sm align-middle hm-paid mr-0.5"></span>Pagado</span>
                        <span><span className="inline-block w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-sm align-middle hm-unpaid mr-0.5"></span>Impago</span>
                        <span><span className="inline-block w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-sm align-middle hm-exc mr-0.5"></span>Excepción</span>
                        <span><span className="inline-block w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-sm align-middle hm-susp mr-0.5"></span>Suspendido</span>
                        <span className="font-bold text-slate-600 sm:ml-2">FIFO</span>
                    </p>
                </div>
                <span className={`bg-${colorTheme}-100 text-${colorTheme}-700 text-[10px] font-bold px-2 py-1 rounded-lg`}>{data.length} socios</span>
            </div>

            <div className="scr overflow-x-auto overflow-y-auto" style={{maxHeight:'540px'}}>
                <table className="border-collapse text-left w-full text-xs min-w-max">
                    <thead className="bg-white sticky top-0 z-10 text-[9px] sm:text-[10px] uppercase text-slate-400 font-bold border-b border-slate-200">
                        <tr>
                            <th className={`p-2 sticky-col bg-white border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.02)] min-w-[120px] max-w-[120px] sm:min-w-[200px] sm:max-w-[200px]`}>Socio</th>
                            {displayColumns.map((c,i)=>(
                                <th key={i} className={`p-2 text-center w-8 sm:w-9 font-mono border-r border-slate-100 ${!c.isRecent3 ? 'hidden md:table-cell' : ''}`}>
                                    {c.label}
                                </th>
                            ))}
                            <th className="p-2 text-center bg-slate-50 border-l border-slate-200 w-16 sm:w-20 leading-tight">Cuotas Impagas</th>
                            <th className="p-2 text-right bg-slate-50 w-20 sm:w-24">Deuda</th>
                        </tr>
                    </thead>
                    <tbody className="text-slate-700">
                        {data.map((s,i)=>(
                            <tr key={i} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                <td className="p-2 sticky-col bg-inherit border-r border-slate-200 font-medium truncate min-w-[120px] max-w-[120px] sm:min-w-[200px] sm:max-w-[200px]" title={s.nombre}>
                                    <div className="flex items-center gap-1.5 justify-between">
                                        <span className="truncate text-[10px] sm:text-[11px] leading-tight">{s.nombre}</span>
                                        {s.isSuspended && <span className="text-[7px] sm:text-[8px] bg-rose-100 text-rose-600 px-1 py-0.5 rounded font-bold">SUSP</span>}
                                    </div>
                                    <div className="text-[8px] sm:text-[9px] text-slate-400 font-normal mt-0.5 truncate">{s.estado}</div>
                                </td>
                                {displayColumns.map((c, j) => {
                                    const m = s.monthData.find(md => md.abs === c.abs);
                                    if(!m) return <td key={j} className={`p-1 border-r border-slate-50 text-center ${!c.isRecent3 ? 'hidden md:table-cell' : ''}`}></td>;
                                    
                                    const cls=m.status==='paid'?'hm-paid':m.status==='unpaid'?'hm-unpaid':m.status==='susp'?'hm-susp':m.status==='future'?'hm-future':m.status==='na'?'hm-na':'hm-exc';
                                    const exCls=m.isException?'hm-exc':'';
                                    return(
                                    <td key={j} className={`p-1 border-r border-slate-50 text-center ${!c.isRecent3 ? 'hidden md:table-cell' : ''}`}>
                                        <div className={`w-full h-7 sm:h-8 flex items-center justify-center rounded-md ${exCls||cls} ${m.status==='future'?'border border-slate-200':''}`} title={m.status==='susp'?'Congelado':`Cuota: ${fmt(m.cuotaMes)} | Exig. Acum: ${fmt(m.exigAcum)}`}>
                                            <span className="text-[9px] sm:text-[10px] font-bold">{m.label}</span>
                                        </div>
                                    </td>);
                                })}
                                <td className="p-2 text-center bg-slate-50 border-l border-slate-200 font-mono font-bold text-rose-600 text-[10px] sm:text-xs">
                                    {s.impagos > 0 ? s.impagos : <span className="text-slate-300">-</span>}
                                </td>
                                <td className="p-2 text-right bg-slate-50 font-mono font-bold text-rose-600 text-[10px] sm:text-xs">{fmt(s.deuda)}</td>
                            </tr>
                        ))}
                        {data.length===0 && <tr><td colSpan={displayColumns.length+3} className="p-4 text-center text-slate-400">No hay socios que coincidan con los filtros.</td></tr>}
                    </tbody>
                </table>
            </div>
        </div>
    );

    if(loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="w-12 h-12 border-4 border-slate-200 rounded-full sp" style={{borderTopColor:'var(--navy)'}}/>
            <p className="mt-4 text-slate-600 font-medium text-sm">Conectando con Google Sheets...</p>
            <div className="mt-3 flex flex-col gap-1 text-xs">
                {Object.entries(ls).map(([k,v])=><span key={k} className={v==='ok'?'text-emerald-600':v===null?'text-slate-400':'text-rose-500'}>{SRC[k]?.l||k} {v==='ok'?'✓':v===null?'...':'✗'}</span>)}
            </div>
        </div>
    );

    const heatActive = heatData.filter(s => !s.isSuspended || (s.isSuspended && s.deuda === 0));
    const heatBlacklist = heatData.filter(s => s.isSuspended && s.deuda > 0);

    return (
    <div className="min-h-screen">
        <div className="sticky top-0 z-40 border-b" style={{background:'var(--navy)'}}>
            <div className="max-w-[1700px] mx-auto px-4 py-2.5 flex flex-wrap items-center justify-between gap-2">
                <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-white text-sm" style={{background:'var(--orange)'}}>SP</div>
                    <div>
                        <h1 className="text-white font-extrabold text-sm sm:text-base tracking-tight leading-tight">Portal de Transparencia</h1>
                        <p className="text-slate-400 text-[9px] font-medium tracking-wider uppercase">Club Ciclista Santiago Pista</p>
                    </div>
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                    <select className="bg-white/10 text-white text-[11px] font-bold px-2.5 py-1.5 rounded-lg border border-white/20 outline-none cursor-pointer" value={yf} onChange={e=>setYf(e.target.value)}>
                        <option value="TODOS" className="text-slate-900">Todos los años</option>
                        <option value="2025" className="text-slate-900">2025</option>
                        <option value="2026" className="text-slate-900">2026</option>
                    </select>
                    <select className="bg-white/10 text-white text-[11px] font-bold px-2.5 py-1.5 rounded-lg border border-white/20 outline-none cursor-pointer" value={mf} onChange={e=>setMf(e.target.value)}>
                        <option value="TODOS" className="text-slate-900">Todos los meses</option>
                        {MFULL.map(m=><option key={m.id} value={m.id} className="text-slate-900">{m.n}</option>)}
                    </select>
                    <input type="text" placeholder="Buscar socio..." className="bg-white/10 text-white placeholder-slate-400 text-[11px] px-2.5 py-1.5 rounded-lg border border-white/20 outline-none w-36 sm:w-48 focus:bg-white/20" value={search} onChange={e=>setSearch(e.target.value)} />
                    <select className="bg-white/10 text-white text-[11px] font-bold px-2.5 py-1.5 rounded-lg border border-white/20 outline-none cursor-pointer" value={sf} onChange={e=>setSf(e.target.value)}>
                        <option value="TODOS" className="text-slate-900">Todos</option>
                        <option value="ACTIVO" className="text-slate-900">Activos</option>
                        <option value="SUSPENDIDO" className="text-slate-900">Suspendidos/Retirados</option>
                    </select>
                    <button onClick={()=>setShowDbg(!showDbg)} className="bg-white/10 text-slate-400 text-[10px] px-2 py-1 rounded cursor-pointer hover:text-white ml-auto">dbg</button>
                </div>
            </div>
        </div>

        <div className="max-w-[1700px] mx-auto px-2 sm:px-4 py-4">
            {showDbg&&(<div className="bg-slate-900 text-slate-300 p-3 rounded-xl mb-4 mono text-[10px] overflow-x-auto scr">
                <div className="flex justify-between mb-2"><span className="text-emerald-400 font-bold">Debug</span><button onClick={()=>setShowDbg(false)} className="text-slate-500 hover:text-white cursor-pointer">×</button></div>
                {Object.entries(dbg).map(([k,info])=><div key={k} className="mb-2"><span className="text-sky-400 font-bold">{SRC[k]?.l||k}:</span>{info.error?<span className="text-rose-400 ml-2">{info.error}</span>:<span className="text-slate-500 ml-2">{info.n} filas | [{info.h?.join(', ')}]</span>}</div>)}
            </div>)}

            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-3 mb-4">
                <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 fin">
                    <p className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Ingresos</p>
                    <h2 className="text-base sm:text-2xl font-extrabold text-emerald-600">{fmt(kI)}</h2>
                </div>
                <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 fin">
                    <p className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Egresos</p>
                    <h2 className="text-base sm:text-2xl font-extrabold text-rose-600">{fmt(kE)}</h2>
                </div>
                <div className={`p-3 md:p-4 rounded-xl shadow-sm border fin ${(kI-kE)>=0?'bg-indigo-50 border-indigo-100':'bg-rose-50 border-rose-100'}`}>
                    <p className={`text-[8px] sm:text-[9px] font-bold uppercase tracking-widest mb-1 ${(kI-kE)>=0?'text-indigo-400':'text-rose-400'}`}>Caja Efectiva</p>
                    <h2 className={`text-base sm:text-2xl font-extrabold ${(kI-kE)>=0?'text-indigo-700':'text-rose-700'}`}>{fmt(kI-kE)}</h2>
                </div>
                <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 fin relative overflow-hidden">
                    <p className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Por Cobrar</p>
                    <h2 className={`text-base sm:text-2xl font-extrabold ${kpiRecaudacion.brecha > 0 ? 'text-amber-500' : 'text-emerald-500'}`}>
                        {fmt(kpiRecaudacion.brecha)}
                    </h2>
                    <p className="text-[8px] text-slate-500 mt-1">Óptimo: {fmt(kpiRecaudacion.optimo)}</p>
                </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 md:p-4 mb-4 fin">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-3 gap-2">
                    <div>
                        <h2 className="font-bold text-slate-800 text-sm">Flujo de Caja (Últimos 4 meses)</h2>
                        <p className="text-[9px] sm:text-[10px] text-slate-400">Histórico estático (Independiente de los filtros superiores)</p>
                    </div>
                    <div className="flex items-center gap-2 sm:gap-4 text-[9px] sm:text-[10px] font-bold flex-wrap">
                        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bar-ing inline-block"></span> Ingresos</span>
                        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bar-egr inline-block"></span> Egresos</span>
                        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bar-cob inline-block"></span> Por Cobrar</span>
                    </div>
                </div>
                
                <div className="scr overflow-x-auto w-full pt-8 px-2" style={{paddingBottom:'4px'}}>
                    <div className="flex items-end justify-between gap-1 sm:gap-2 w-full min-w-[400px] sm:min-w-[500px]" style={{height:'170px'}}>
                        {chartData4Months.map((d,i)=>{
                            const maxB = maxBar > 0 ? maxBar : 1;
                            const hI = (d.ing / maxB) * 140;
                            const hE = (d.eg / maxB) * 140;
                            const hC = (d.porCobrar / maxB) * 140;
                            return(
                            <div key={i} className="flex-1 flex flex-col items-center">
                                <div className="flex items-end justify-center gap-[1px] sm:gap-1 w-full" style={{height:'140px'}}>
                                    
                                    <div className="bar-ing rounded-t-sm relative group w-1/3 max-w-[28px] sm:max-w-[40px]" style={{height:`${Math.max(hI,2)}px`}}>
                                        {d.ing>0&&<div className="absolute -top-6 left-1/2 -translate-x-1/2 text-slate-600 text-[8px] sm:text-[10px] font-bold whitespace-nowrap z-10">{fmtK(d.ing)}</div>}
                                    </div>
                                    
                                    <div className="bar-egr rounded-t-sm relative group w-1/3 max-w-[28px] sm:max-w-[40px]" style={{height:`${Math.max(hE,2)}px`}}>
                                        {d.eg>0&&<div className="absolute -top-6 left-1/2 -translate-x-1/2 text-slate-600 text-[8px] sm:text-[10px] font-bold whitespace-nowrap z-10">{fmtK(d.eg)}</div>}
                                    </div>
                                    
                                    <div className="bar-cob rounded-t-sm relative group w-1/3 max-w-[28px] sm:max-w-[40px]" style={{height:`${Math.max(hC,2)}px`}}>
                                        {d.porCobrar>0&&<div className="absolute -top-6 left-1/2 -translate-x-1/2 text-slate-600 text-[8px] sm:text-[10px] font-bold whitespace-nowrap z-10">{fmtK(d.porCobrar)}</div>}
                                    </div>
                                    
                                </div>
                                <span className="text-[9px] sm:text-[10px] text-slate-500 font-bold mt-2 whitespace-nowrap">{d.label}</span>
                            </div>);
                        })}
                    </div>
                </div>
            </div>

            <div className="flex items-center gap-1 mb-3">
                <button onClick={()=>setTab('heatmap')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer ${tab==='heatmap'?'bg-white shadow-sm text-slate-800 border border-slate-200':'text-slate-500 hover:text-slate-700'}`}>
                    <Ic name="grid-3x3" cls="w-3 h-3 inline mr-1" /> Mapa de Cuotas
                </button>
                <button onClick={()=>setTab('egresos')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer ${tab==='egresos'?'bg-white shadow-sm text-slate-800 border border-slate-200':'text-slate-500 hover:text-slate-700'}`}>
                    <Ic name="arrow-down-right" cls="w-3 h-3 inline mr-1" /> Egresos
                </button>
            </div>

            {tab === 'heatmap' && (
                <div className="pb-8">
                    {heatActive.length > 0 && renderTable(heatActive, "Matriz de Socios Activos / Regulares", "emerald")}
                    {heatBlacklist.length > 0 && renderTable(heatBlacklist, "Lista Negra (Suspendidos / Retirados con deuda)", "rose")}
                </div>
            )}

            {tab === 'egresos' && (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 fin">
                    <h2 className="font-bold text-slate-800 text-sm mb-4">Detalle de Egresos</h2>
                    {egresos.length===0?<p className="text-sm text-slate-500">No hay egresos en este periodo.</p>:(
                        <div className="overflow-x-auto scr">
                            <table className="w-full text-left text-xs min-w-[500px]">
                                <thead className="text-[10px] text-slate-400 uppercase font-bold border-b border-slate-100">
                                    <tr><th className="py-2">Fecha</th><th className="py-2">Categoría</th><th className="py-2">Descripción</th><th className="py-2 text-right">Monto</th></tr>
                                </thead>
                                <tbody>
                                    {egresos.map((e,i)=>(
                                        <tr key={i} className="border-b border-slate-50">
                                            <td className="py-2 font-mono text-[10px] text-slate-500">{e.fecha}</td>
                                            <td className="py-2"><span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[10px] font-bold">{e.cat}</span></td>
                                            <td className="py-2 text-slate-700 truncate max-w-[200px]" title={e.desc}>{e.desc}</td>
                                            <td className="py-2 text-right font-mono text-rose-600 font-bold">{fmt(e.monto)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            )}

        </div>
    </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
